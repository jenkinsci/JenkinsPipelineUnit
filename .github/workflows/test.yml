name: Tests
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
jobs:
  test:
    name: macos-21
    runs-on: macos-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Tests
        run: ./gradlew --no-daemon cleanTest build
